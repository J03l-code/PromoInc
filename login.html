<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión | PromoInc</title>
  <link rel="stylesheet" href="assets/css/main.css?v=19.0">
  <link rel="stylesheet" href="assets/css/components.css?v=19.0">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-primary);
      padding: 20px;
    }

    .auth-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      padding: 40px;
      border-radius: 24px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      text-align: center;
    }

    .auth-logo {
      margin-bottom: 30px;
    }

    .auth-logo img {
      height: 45px;
    }

    .auth-header h1 {
      font-size: 1.6rem;
      margin-bottom: 10px;
      color: var(--text-primary);
    }

    .auth-header p {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 30px;
    }

    .alert {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 0.85rem;
      display: none;
    }

    .alert-error { background: rgba(220, 53, 69, 0.1); color: #ff4d5e; border: 1px solid rgba(220, 53, 69, 0.2); }
    .alert-success { background: rgba(0, 255, 136, 0.1); color: #00ff88; border: 1px solid rgba(0, 255, 136, 0.2); }

    .b2b-cta {
      margin-top: 40px;
      padding-top: 25px;
      border-top: 1px solid var(--border);
    }
    
    .b2b-cta p {
      font-size: 0.85rem;
      color: var(--text-subtle);
      margin-bottom: 15px;
    }
  </style>
</head>

<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <a href="index.php"><img src="assets/images/logo blanco (2).png" alt="PromoInc"></a>
      </div>

      <div class="auth-header">
        <h1>Bienvenido</h1>
        <p>Inicia sesión para guardar tus productos favoritos y gestionar tus cotizaciones.</p>
      </div>

      <div id="alert-box" class="alert"></div>

      <!-- Google Login -->
      <div style="display: flex; justify-content: center; margin-bottom: 20px;">
        <div id="g_id_onload" data-client_id="360954059404-4gr9qhvao165puul959ckve1trqes62f.apps.googleusercontent.com"
          data-context="signin" data-ux_mode="popup" data-callback="handleGoogleLogin" data-auto_prompt="false">
        </div>
        <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="filled_black"
          data-text="continue_with" data-size="large" data-logo_alignment="left" style="width: 100%;">
        </div>
      </div>

      <div class="b2b-cta">
        <p>¿Eres una empresa con acceso exclusivo?</p>
        <a href="login_b2b.html" class="btn btn-secondary" style="width: 100%; justify-content: center; border-color: var(--accent-pink); color: var(--accent-pink);">
          Acceso a Empresas
        </a>
      </div>

      <div style="margin-top: 25px;">
        <a href="index.php" style="color: var(--text-subtle); font-size: 0.8rem; text-decoration: underline;">Volver a la tienda</a>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const params = new URLSearchParams(window.location.search);
      if (params.has('no_redirect')) return;

      try {
        const res = await fetch('api/auth_b2b.php?action=me', { credentials: 'include', cache: 'no-cache' });
        if (res.ok) {
          window.location.href = 'portal.html';
        }
      } catch (err) {}
    });

    function showAlert(msg, isError) {
      const box = document.getElementById('alert-box');
      box.textContent = msg;
      box.className = 'alert ' + (isError ? 'alert-error' : 'alert-success');
      box.style.display = 'block';
    }

    async function handleGoogleLogin(response) {
      showAlert('Autenticando...', false);
      console.log('Google Response received');
      try {
        const res = await fetch('api/google_auth.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ credential: response.credential })
        });
        
        const text = await res.text();
        console.log('Server response:', text);
        
        let data;
        try { data = JSON.parse(text); } catch(e) { throw new Error('Error interno del servidor (Invalid JSON)'); }

        if (!res.ok) throw new Error(data.error || 'Error de autenticación');
        
        showAlert('¡Éxito! Redirigiendo...', false);
        window.location.href = 'portal.html';
      } catch (err) {
        console.error('Login error:', err);
        showAlert('Error: ' + err.message, true);
        // Fallback for visual confirmation
        alert('Error de inicio de sesión: ' + err.message);
      }
    }
  </script>
</body>

</html>
