<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso Empresarial | PromoInc</title>
  <link rel="stylesheet" href="assets/css/main.css?v=21.0">
  <link rel="stylesheet" href="assets/css/components.css?v=21.0">
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-primary);
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    .auth-container::before {
      content: '';
      position: absolute;
      width: 150%;
      height: 150%;
      background: radial-gradient(circle at 30% 30%, rgba(0, 188, 255, 0.05) 0%, transparent 50%),
                  radial-gradient(circle at 70% 70%, rgba(232, 62, 140, 0.05) 0%, transparent 50%);
      pointer-events: none;
    }

    .auth-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      padding: 40px;
      border-radius: 24px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
      position: relative;
      z-index: 1;
      backdrop-filter: blur(10px);
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 30px;
    }

    .auth-logo img {
      height: 50px;
    }

    .auth-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .auth-header h1 {
      font-size: 1.5rem;
      margin-bottom: 8px;
      color: var(--text-primary);
    }

    .auth-header p {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .alert {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 0.85rem;
      display: none;
    }

    .alert-error {
      background: rgba(220, 53, 69, 0.1);
      color: #ff4d5e;
      border: 1px solid rgba(220, 53, 69, 0.2);
    }

    .alert-success {
      background: rgba(0, 255, 136, 0.1);
      color: #00ff88;
      border: 1px solid rgba(0, 255, 136, 0.2);
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-bottom: 20px;
      transition: color 0.3s;
    }

    .btn-back:hover {
      color: var(--accent-cyan);
    }
  </style>
</head>

<body>
  <div class="auth-container">
    <div class="auth-card">
      <a href="login.html" class="btn-back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Volver
      </a>

      <div class="auth-logo">
        <a href="index.php"><img src="assets/images/logo blanco (2).png" alt="PromoInc"></a>
      </div>

      <div class="auth-header">
        <h1>Acceso a Empresas</h1>
        <p>Ingresa tus credenciales corporativas proporcionadas por el administrador.</p>
      </div>

      <div id="alert-box" class="alert"></div>

      <form id="form-login" onsubmit="handleLogin(event)">
        <div class="form-group" style="margin-bottom: 15px;">
          <label class="form-label">Correo Corporativo</label>
          <input type="email" id="login-email" class="form-control" required placeholder="empresa@correo.com">
        </div>
        <div class="form-group" style="margin-bottom: 25px;">
          <label class="form-label">Contraseña</label>
          <input type="password" id="login-password" class="form-control" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; background: var(--accent-pink);">
          Entrar al Portal B2B
        </button>
      </form>

      <div style="text-align: center; margin-top: 30px; border-top: 1px solid var(--border); padding-top: 20px;">
        <p style="font-size: 0.8rem; color: var(--text-subtle);">
          ¿No tienes acceso? Contacta a tu asesor comercial de PromoInc.
        </p>
      </div>
    </div>
  </div>

  <script>
    function showAlert(msg, isError) {
      const box = document.getElementById('alert-box');
      box.textContent = msg;
      box.className = 'alert ' + (isError ? 'alert-error' : 'alert-success');
      box.style.display = 'block';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      const originalText = btn.textContent;
      btn.textContent = 'Verificando...';
      btn.disabled = true;

      try {
        const res = await fetch('api/auth_b2b.php?action=login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          cache: 'no-cache',
          body: JSON.stringify({
            email: document.getElementById('login-email').value,
            password: document.getElementById('login-password').value
          })
        });
        const data = await res.json();

        if (!res.ok) throw new Error(data.error || 'Error de autenticación');

        window.location.href = 'portal.html';
      } catch (err) {
        showAlert(err.message, true);
        btn.textContent = originalText;
        btn.disabled = false;
      }
    }
  </script>
</body>

</html>
