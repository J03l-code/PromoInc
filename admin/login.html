<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PromoInc — Acceso Administrativo</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0d0f12;
      --surface: #161a1f;
      --border: #252a31;
      --muted: #6c737e;
      --text: #f0f2f5;
      --pink: #E83E8C;
      --cyan: #00BCFF;
      --gold: #FFC107;
      --radius: 12px;
      --font: 'Plus Jakarta Sans', sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Orbs de fondo */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      opacity: 0.5;
    }

    .orb-1 {
      width: 400px;
      height: 400px;
      background: var(--pink);
      top: -100px;
      left: -100px;
      opacity: 0.08;
    }

    .orb-2 {
      width: 350px;
      height: 350px;
      background: var(--cyan);
      bottom: -80px;
      right: -80px;
      opacity: 0.07;
    }

    .orb-3 {
      width: 200px;
      height: 200px;
      background: var(--gold);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0.04;
    }

    /* Líneas de cuadrícula */
    .grid-overlay {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    .login-card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      box-shadow: 0 32px 80px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.04);
    }

    /* Logo */
    .login-logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 2.5rem;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
    }

    .logo-text {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .logo-text span {
      color: var(--cyan);
    }

    .logo-badge {
      margin-left: auto;
      padding: 0.25rem 0.7rem;
      background: rgba(232, 62, 140, 0.1);
      border: 1px solid rgba(232, 62, 140, 0.25);
      border-radius: 100px;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--pink);
      text-transform: uppercase;
    }

    /* Encabezado */
    .login-header {
      margin-bottom: 2rem;
    }

    .login-header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.4rem;
    }

    .login-header p {
      font-size: 0.9rem;
      color: var(--muted);
    }

    /* Formulario */
    .form-group {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 0.83rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.5rem;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius);
      padding: 0.85rem 1rem;
      font-family: var(--font);
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(0, 188, 255, 0.12);
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap input {
      padding-right: 2.8rem;
    }

    .toggle-pass {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      padding: 0;
      transition: color 0.2s;
    }

    .toggle-pass:hover {
      color: var(--text);
    }

    .toggle-pass svg {
      width: 18px;
      height: 18px;
    }

    .btn-login {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, var(--pink) 0%, #c0255f 100%);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: all 0.25s;
      margin-top: 0.5rem;
      position: relative;
      overflow: hidden;
    }

    .btn-login::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0);
      transition: background 0.2s;
    }

    .btn-login:hover::after {
      background: rgba(255, 255, 255, 0.06);
    }

    .btn-login:active {
      transform: scale(0.99);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* Loading spinner en el botón */
    .btn-login .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }

    .btn-login.loading .btn-text {
      display: none;
    }

    .btn-login.loading .spinner {
      display: block;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Error toast */
    .alert {
      display: none;
      align-items: center;
      gap: 0.6rem;
      padding: 0.85rem 1rem;
      border-radius: var(--radius);
      font-size: 0.88rem;
      font-weight: 500;
      margin-bottom: 1.25rem;
      animation: slideDown 0.3s ease;
    }

    .alert.error {
      background: rgba(220, 53, 69, 0.12);
      border: 1px solid rgba(220, 53, 69, 0.3);
      color: #ff6b7a;
    }

    .alert.show {
      display: flex;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Footer del card */
    .login-footer {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .login-footer svg {
      width: 14px;
      height: 14px;
      color: var(--muted);
    }

    .login-footer span {
      font-size: 0.78rem;
      color: var(--muted);
    }

    .login-footer a {
      color: var(--cyan);
      font-size: 0.78rem;
      text-decoration: none;
    }

    .login-footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="grid-overlay"></div>

  <div class="login-card">
    <div class="login-logo">
      <img src="../assets/images/logo blanco (2).png" alt="PromoInc Logo"
        style="height: 80px; width: auto; object-fit: contain; margin-right: 10px;">
      <span class="logo-badge">Admin</span>
    </div>

    <div class="login-header">
      <h1>Bienvenido de vuelta</h1>
      <p>Ingresa tus credenciales para acceder al panel de control.</p>
    </div>

    <div class="alert error" id="alert-error">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
        <circle cx="12" cy="12" r="10" />
        <line x1="12" y1="8" x2="12" y2="12" />
        <line x1="12" y1="16" x2="12.01" y2="16" />
      </svg>
      <span id="alert-text">Credenciales incorrectas.</span>
    </div>

    <form id="login-form" autocomplete="on" novalidate>
      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" placeholder="admin@promoinc.com" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-wrap">
          <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password"
            required>
          <button type="button" class="toggle-pass" id="toggle-pass" title="Mostrar/Ocultar contraseña">
            <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn-login" id="btn-login">
        <span class="btn-text">Iniciar Sesión</span>
        <div class="spinner"></div>
      </button>
    </form>

    <div class="login-footer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
        <path d="M7 11V7a5 5 0 0 1 10 0v4" />
      </svg>
      <span>Acceso restringido.</span>
      <a href="../index.html">← Volver al sitio</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const btnLogin = document.getElementById('btn-login');
    const alertEl = document.getElementById('alert-error');
    const alertText = document.getElementById('alert-text');
    const togglePass = document.getElementById('toggle-pass');
    const passInput = document.getElementById('password');

    // Comprobar si ya hay sesión activa
    (async () => {
      try {
        const res = await fetch('../api/auth.php');
        const json = await res.json();
        if (json.data?.loggedIn) window.location.href = 'index.html';
      } catch (_) { }
    })();

    // Toggle contraseña
    togglePass.addEventListener('click', () => {
      const isPass = passInput.type === 'password';
      passInput.type = isPass ? 'text' : 'password';
      togglePass.querySelector('svg').innerHTML = isPass
        ? '<line x1="1" y1="1" x2="23" y2="23"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>'
        : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    });

    function showError(msg) {
      alertText.textContent = msg;
      alertEl.classList.add('show');
    }

    function hideError() {
      alertEl.classList.remove('show');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const email = document.getElementById('email').value.trim();
      const password = passInput.value;

      if (!email || !password) {
        showError('Por favor completa todos los campos.');
        return;
      }

      btnLogin.classList.add('loading');
      btnLogin.disabled = true;

      try {
        const res = await fetch('../api/auth.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'login', email, password }),
        });
        const json = await res.json();

        if (json.success && json.data.loggedIn) {
          window.location.href = 'index.html';
        } else {
          showError(json.error || 'Credenciales incorrectas.');
        }
      } catch (_) {
        showError('Error de conexión. Inténtalo de nuevo.');
      } finally {
        btnLogin.classList.remove('loading');
        btnLogin.disabled = false;
      }
    });
  </script>
</body>

</html>
