<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso Corporativo | PromoInc</title>
  <link rel="stylesheet" href="assets/css/main.css?v=2.8">
  <link rel="stylesheet" href="assets/css/components.css?v=2.8">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-body);
      padding: 20px;
    }

    .auth-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 450px;
      box-shadow: var(--shadow-card);
    }

    .auth-logo {
      display: flex;
      justify-content: center;
      margin-bottom: 30px;
    }

    .auth-logo img {
      height: 60px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      margin-bottom: 8px;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .form-control {
      width: 100%;
      padding: 12px 15px;
      background: var(--bg-body);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      transition: var(--duration-fast);
    }

    .form-control:focus {
      border-color: var(--accent-cyan);
      outline: none;
    }

    .auth-tabs {
      display: flex;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .auth-tab {
      flex: 1;
      text-align: center;
      padding: 10px;
      cursor: pointer;
      color: var(--text-muted);
      border-bottom: 2px solid transparent;
    }

    .auth-tab.active {
      color: var(--accent-cyan);
      border-bottom-color: var(--accent-cyan);
    }

    .alert {
      padding: 10px 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 0.9rem;
      display: none;
    }

    .alert-error {
      background: rgba(232, 62, 140, 0.1);
      color: var(--accent-pink);
      border: 1px solid rgba(232, 62, 140, 0.2);
    }

    .alert-success {
      background: rgba(0, 255, 136, 0.1);
      color: #00ff88;
      border: 1px solid rgba(0, 255, 136, 0.2);
    }
  </style>
</head>

<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <a href="index.html"><img src="assets/images/logo blanco (2).png" alt="PromoInc"></a>
      </div>

      <div class="auth-tabs">
        <div class="auth-tab active" onclick="switchTab('login')">Ingresar a B2B</div>
        <div class="auth-tab" onclick="switchTab('google')">Usuarios</div>
      </div>

      <div id="alert-box" class="alert"></div>

      <!-- Formulario Login B2B -->
      <form id="form-login" onsubmit="handleLogin(event)">
        <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 20px; text-align: center;">Acceso
          exclusivo para empresas registradas por el administrador.</p>
        <div class="form-group">
          <label class="form-label">Correo Corporativo</label>
          <input type="email" id="login-email" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label">Contraseña</label>
          <input type="password" id="login-password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">Iniciar Sesión
          B2B</button>
      </form>

      <!-- Google Login -->
      <div id="form-google" style="display: none; text-align: center;">
        <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 20px;">Continúa con tu cuenta de Google
          para guardar tus cotizaciones y productos favoritos.</p>

        <!-- Contenedor del botón de Google -->
        <div id="g_id_onload" data-client_id="360954059404-4gr9qhvao165puul959ckve1trqes62f.apps.googleusercontent.com"
          data-context="signin" data-ux_mode="popup" data-callback="handleGoogleLogin" data-auto_prompt="false">
        </div>
        <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="outline"
          data-text="continue_with" data-size="large" data-logo_alignment="left"
          style="display:flex; justify-content:center;">
        </div>
      </div>

      <div style="text-align: center; margin-top: 20px;">
        <a href="index.html" style="color: var(--text-muted); font-size: 0.85rem; text-decoration: underline;">Volver a
          la tienda</a>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // Check if already logged in (skip if we just came from a portal failure)
      const params = new URLSearchParams(window.location.search);
      if (params.has('no_redirect')) return;

      try {
        const res = await fetch('api/auth_b2b.php?action=me');
        if (res.ok) {
          window.location.href = 'portal.html';
        }
      } catch (err) {
        console.log('No active session');
      }
    });

    function switchTab(tab) {
      const tabs = document.querySelectorAll('.auth-tab');
      tabs.forEach(t => t.classList.remove('active'));
      
      if (tab === 'login') {
        tabs[0].classList.add('active');
        document.getElementById('form-login').style.display = 'block';
        document.getElementById('form-google').style.display = 'none';
      } else {
        tabs[1].classList.add('active');
        document.getElementById('form-login').style.display = 'none';
        document.getElementById('form-google').style.display = 'block';
      }
      document.getElementById('alert-box').style.display = 'none';
    }

    function showAlert(msg, isError) {
      const box = document.getElementById('alert-box');
      box.textContent = msg;
      box.className = 'alert ' + (isError ? 'alert-error' : 'alert-success');
      box.style.display = 'block';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      const originalText = btn.textContent;
      btn.textContent = 'Iniciando...';
      btn.disabled = true;

      try {
        const res = await fetch('api/auth_b2b.php?action=login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('login-email').value,
            password: document.getElementById('login-password').value
          })
        });
        const data = await res.json();

        if (!res.ok) throw new Error(data.error || 'Error de autenticación');

        window.location.href = 'portal.html';
      } catch (err) {
        showAlert(err.message, true);
        btn.textContent = originalText;
        btn.disabled = false;
      }
    }

    // Google Auth Callback
    async function handleGoogleLogin(response) {
      showAlert('Autenticando con Google...', false);
      try {
        const res = await fetch('api/google_auth.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ credential: response.credential })
        });

        const data = await res.json();

        if (!res.ok) throw new Error(data.error || 'Error al autenticar con Google');

        // Success! Redirect to portal
        window.location.href = 'portal.html';
      } catch (err) {
        showAlert(err.message, true);
      }
    }
  </script>
</body>

</html>
